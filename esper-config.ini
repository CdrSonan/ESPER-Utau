[caching]
; use options: whether to use data from .frq/.esper files if they exist.
; if set to false, pitch and esper analysis will always be recalculated.
;
; create options: whether to create .frq/.esper files if they don't exist.
; if set to false, pitch and esper analysis will never be saved to disk, even if they were calculated.
;
; overwrite options: whether to overwrite .frq/.esper files if they exist.
; use with caution, especially overwriteFrqFiles!
; This only has an effect if the matching use option is set to false.
;
usefrq = true
createfrq = true
overwritefrq = false
useesp = true
createesp = true
overwriteesp = true

[data_batching]
; controls the size of the .esp data representation used by the resampler.
; nvoiced: number of voiced harmonics
; nUnvoiced: number of unvoiced frequency bins
; stepsize: length of a .esp frame in audio samples (excluding overlap)
;
nvoiced = 65
nunvoiced = 257
stepsize = 256

[defaults]
; miscellaneous default values.
; expPitch: default value used for expected pitch during audio analysis. Can be null.
; pitchOscillatorDamping: damping factor of the harmonic oscillator used for smoothing the
;  waveform before pitch detection. Higher values make pitch detection more resilient to noise,
;  but may provoke other errors. Set to null to fully disable the oscillator.
;
exppitch = null
pitchoscillatordamping = null


[kalman_filter]
; Kalman filter parameters for voiced-unvoiced separation
; modify at your own peril!
; processNoiseVariance: How fast the voiced component can change (default: 0.01)
; measurementNoiseVariance: Baseline voiced component variance (default: 0.1)
; robustThreshold: Robustness threshold for normalized residuals (default: 2.5)
; scaleForgettingFactor: Exponential forgetting factor for robust scale estimate (default: 0.05)
; initialVarianceMultiplier: Multiplier for initial variance (default: 1.0)
; initialObsStdMultiplier: Multiplier for initial observation standard deviation (default: 0.5)
;
processNoiseVariance = 0.01
measurementNoiseVariance = 0.1
robustThreshold = 2.5
scaleForgettingFactor = 0.05
initialVarianceMultiplier = 1.0
initialObsStdMultiplier = 0.5